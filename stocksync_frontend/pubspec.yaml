name: vvp
description: Venkateswara Vaccine Pharma - Wholesale Inventory App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.1.0
  provider: ^6.0.5
  socket_io_client: ^2.0.0
  razorpay_flutter: ^1.4.1
  intl: ^0.20.2
  fl_chart: ^1.1.1
  csv: ^7.2.0
  path_provider: ^2.1.5
  url_launcher: ^6.2.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/logo_square.png

flutter_native_splash:
  color: "#4361EE"
  android: true
  ios: false
  fullscreen: true
  android_12:
    color: "#4361EE"

